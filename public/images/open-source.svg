<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open source collaboration">
  <!-- Background -->
  <rect width="500" height="400" fill="#f8fafc"/>

  <!-- Laptop -->
  <rect x="100" y="160" width="300" height="190" fill="#1e293b" rx="10"/>
  <rect x="112" y="170" width="276" height="165" fill="#0f172a" rx="6"/>
  <rect x="75" y="350" width="350" height="16" fill="#334155" rx="4"/>
  <rect x="185" y="350" width="130" height="10" fill="#475569" rx="3"/>

  <!-- Code on screen -->
  <rect x="120" y="178" width="260" height="150" fill="#0f172a" rx="4"/>
  <rect x="128" y="188" width="80" height="7" fill="#7c3aed" rx="3"/>
  <rect x="138" y="200" width="120" height="7" fill="#0ea5e9" rx="3"/>
  <rect x="148" y="212" width="90" height="7" fill="#86efac" rx="3"/>
  <rect x="148" y="224" width="110" height="7" fill="#fbbf24" rx="3"/>
  <rect x="138" y="236" width="70" height="7" fill="#f87171" rx="3"/>
  <rect x="128" y="248" width="95" height="7" fill="#7c3aed" rx="3"/>
  <rect x="138" y="260" width="130" height="7" fill="#0ea5e9" rx="3"/>
  <rect x="148" y="272" width="80" height="7" fill="#86efac" rx="3"/>
  <rect x="128" y="284" width="60" height="7" fill="#7c3aed" rx="3"/>

  <!-- GitHub-style avatars floating around -->
  <!-- Avatar 1 -->
  <circle cx="75" cy="200" r="28" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="75" cy="193" r="11" fill="#fbbf24"/>
  <path d="M58 218 Q75 210 92 218" fill="#fed7aa"/>

  <!-- Avatar 2 -->
  <circle cx="425" cy="200" r="28" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="425" cy="193" r="11" fill="#86efac"/>
  <path d="M408 218 Q425 210 442 218" fill="#bbf7d0"/>

  <!-- Avatar 3 -->
  <circle cx="75" cy="290" r="28" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="75" cy="283" r="11" fill="#f9a8d4"/>
  <path d="M58 308 Q75 300 92 308" fill="#fce7f3"/>

  <!-- Avatar 4 -->
  <circle cx="425" cy="290" r="28" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="425" cy="283" r="11" fill="#93c5fd"/>
  <path d="M408 308 Q425 300 442 308" fill="#dbeafe"/>

  <!-- Connection lines to laptop -->
  <line x1="100" y1="200" x2="103" y2="210" stroke="#3b86fc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="400" y1="200" x2="397" y2="210" stroke="#3b86fc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="100" y1="290" x2="103" y2="290" stroke="#3b86fc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="400" y1="290" x2="397" y2="290" stroke="#3b86fc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- AGPL badge -->
  <rect x="170" y="75" width="160" height="60" fill="white" rx="10" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="200" cy="105" r="20" fill="#dbeafe"/>
  <text x="200" y="111" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="800">©</text>
  <rect x="226" y="93" width="90" height="9" fill="#1e293b" rx="4"/>
  <rect x="226" y="108" width="70" height="7" fill="#94a3b8" rx="3"/>

  <!-- Stars (for GitHub stargazers) -->
  <text x="230" y="50" fill="#fbbf24" font-size="24">★</text>
  <text x="255" y="40" fill="#fbbf24" font-size="18">★</text>
  <text x="277" y="52" fill="#fbbf24" font-size="22">★</text>
</svg>
