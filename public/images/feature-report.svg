<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mobile phone with map and location pin">
  <!-- Phone body -->
  <rect x="150" y="40" width="200" height="340" fill="#1e293b" rx="24"/>
  <rect x="160" y="55" width="180" height="310" fill="#f8fafc" rx="16"/>

  <!-- Notch -->
  <rect x="220" y="48" width="60" height="12" fill="#0f172a" rx="6"/>

  <!-- Map background -->
  <rect x="165" y="65" width="170" height="185" fill="#e0f2fe" rx="8"/>

  <!-- Map roads -->
  <line x1="165" y1="130" x2="335" y2="130" stroke="#94a3b8" stroke-width="6"/>
  <line x1="165" y1="175" x2="335" y2="175" stroke="#94a3b8" stroke-width="6"/>
  <line x1="220" y1="65" x2="220" y2="250" stroke="#94a3b8" stroke-width="6"/>
  <line x1="280" y1="65" x2="280" y2="250" stroke="#94a3b8" stroke-width="6"/>

  <!-- Map blocks -->
  <rect x="170" y="70" width="45" height="55" fill="#bfdbfe" rx="3"/>
  <rect x="225" y="70" width="50" height="55" fill="#bfdbfe" rx="3"/>
  <rect x="285" y="70" width="45" height="55" fill="#bfdbfe" rx="3"/>
  <rect x="170" y="135" width="45" height="35" fill="#bfdbfe" rx="3"/>
  <rect x="225" y="135" width="50" height="35" fill="#bfdbfe" rx="3"/>
  <rect x="285" y="135" width="45" height="35" fill="#bfdbfe" rx="3"/>
  <rect x="170" y="180" width="45" height="62" fill="#bfdbfe" rx="3"/>
  <rect x="225" y="180" width="50" height="62" fill="#bfdbfe" rx="3"/>
  <rect x="285" y="180" width="45" height="62" fill="#bfdbfe" rx="3"/>

  <!-- Location pin -->
  <path d="M250 110 C241 110 234 117 234 126 C234 138 250 155 250 155 C250 155 266 138 266 126 C266 117 259 110 250 110 Z" fill="#ef4444"/>
  <circle cx="250" cy="126" r="7" fill="white"/>

  <!-- Ripple around pin -->
  <circle cx="250" cy="155" r="18" fill="#ef4444" opacity="0.15"/>
  <circle cx="250" cy="155" r="28" fill="#ef4444" opacity="0.08"/>

  <!-- Status bar area -->
  <rect x="165" y="260" width="170" height="100" fill="#f8fafc" rx="8"/>

  <!-- Report card -->
  <rect x="170" y="266" width="160" height="88" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Report icon -->
  <circle cx="190" cy="287" r="12" fill="#dbeafe"/>
  <rect x="185" y="283" width="10" height="8" fill="#3b82f6" rx="1"/>
  <rect x="183" y="284" width="3" height="1" fill="#3b82f6"/>

  <!-- Report title -->
  <rect x="208" y="281" width="72" height="8" fill="#1e293b" rx="3"/>
  <rect x="208" y="293" width="52" height="6" fill="#94a3b8" rx="3"/>

  <!-- Vote section -->
  <rect x="175" y="308" width="50" height="20" fill="#dbeafe" rx="10"/>
  <text x="200" y="322" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="700">+12</text>
  <rect x="234" y="308" width="50" height="20" fill="#fee2e2" rx="10"/>
  <text x="259" y="322" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">-2</text>
  <rect x="293" y="308" width="30" height="20" fill="#f1f5f9" rx="10"/>
  <text x="308" y="322" text-anchor="middle" fill="#64748b" font-size="10">···</text>

  <!-- Home button -->
  <rect x="230" y="370" width="40" height="6" fill="#334155" rx="3"/>
</svg>
