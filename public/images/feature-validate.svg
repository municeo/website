<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Municipal agent validating an issue">
  <!-- Background -->
  <rect width="500" height="400" fill="#fafafa"/>
  <ellipse cx="250" cy="380" rx="200" ry="30" fill="#e2e8f0" opacity="0.5"/>

  <!-- Municipal agent body -->
  <!-- Head -->
  <circle cx="250" cy="120" r="45" fill="#fbbf24"/>
  <!-- Hair -->
  <ellipse cx="250" cy="85" rx="45" ry="18" fill="#1e293b"/>
  <!-- Uniform body -->
  <rect x="200" y="162" width="100" height="110" fill="#1d4ed8" rx="8"/>
  <!-- Collar / badge area -->
  <rect x="224" y="162" width="52" height="30" fill="#1e40af" rx="4"/>
  <circle cx="250" cy="175" r="12" fill="#fbbf24"/>
  <text x="250" y="180" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">M</text>
  <!-- Arms -->
  <rect x="170" y="165" width="30" height="80" fill="#1d4ed8" rx="6"/>
  <rect x="300" y="165" width="30" height="80" fill="#1d4ed8" rx="6"/>
  <!-- Hands -->
  <circle cx="185" cy="250" r="14" fill="#fbbf24"/>
  <circle cx="315" cy="250" r="14" fill="#fbbf24"/>
  <!-- Legs -->
  <rect x="215" y="272" width="30" height="70" fill="#1e293b" rx="4"/>
  <rect x="255" y="272" width="30" height="70" fill="#1e293b" rx="4"/>
  <!-- Shoes -->
  <rect x="210" y="335" width="40" height="18" fill="#0f172a" rx="4"/>
  <rect x="250" y="335" width="40" height="18" fill="#0f172a" rx="4"/>

  <!-- Clipboard in hand -->
  <rect x="320" y="215" width="70" height="90" fill="white" rx="6" stroke="#94a3b8" stroke-width="2"/>
  <rect x="345" y="210" width="20" height="12" fill="#94a3b8" rx="3"/>
  <rect x="330" y="232" width="50" height="6" fill="#e2e8f0" rx="3"/>
  <rect x="330" y="244" width="50" height="6" fill="#e2e8f0" rx="3"/>
  <rect x="330" y="256" width="35" height="6" fill="#e2e8f0" rx="3"/>
  <!-- Checkmark on clipboard -->
  <circle cx="355" cy="280" r="14" fill="#16a34a"/>
  <polyline points="347,280 353,286 363,272" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Photo evidence card floating -->
  <rect x="70" y="180" width="110" height="80" fill="white" rx="10" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="76" y="186" width="98" height="52" fill="#bfdbfe" rx="6"/>
  <!-- Simple photo content -->
  <rect x="82" y="192" width="30" height="24" fill="#93c5fd" rx="3"/>
  <rect x="118" y="192" width="50" height="10" fill="#dbeafe" rx="3"/>
  <rect x="118" y="206" width="40" height="8" fill="#dbeafe" rx="3"/>
  <rect x="118" y="218" width="45" height="8" fill="#dbeafe" rx="3"/>
  <rect x="76" y="244" width="98" height="10" fill="#f1f5f9" rx="3"/>
  <!-- Badge -->
  <circle cx="175" cy="173" r="14" fill="#16a34a"/>
  <text x="175" y="178" text-anchor="middle" fill="white" font-size="14" font-weight="700">✓</text>
</svg>
