<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Privacy and anonymity shield">
  <!-- Background glow -->
  <circle cx="250" cy="200" r="160" fill="#eff6ff" opacity="0.8"/>

  <!-- Large shield -->
  <path d="M250 60 L370 110 L370 220 C370 295 250 350 250 350 C250 350 130 295 130 220 L130 110 Z" fill="#3b86fc"/>
  <path d="M250 80 L352 124 L352 220 C352 284 250 332 250 332 C250 332 148 284 148 220 L148 124 Z" fill="#2462f1"/>

  <!-- Lock icon center -->
  <rect x="220" y="185" width="60" height="50" fill="white" rx="8"/>
  <path d="M230 185 L230 170 C230 157 270 157 270 170 L270 185" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <circle cx="250" cy="210" r="10" fill="#3b86fc"/>
  <rect x="247" y="210" width="6" height="14" fill="#3b86fc" rx="3"/>

  <!-- Anonymous user icon -->
  <circle cx="250" cy="148" r="22" fill="white" opacity="0.2"/>
  <circle cx="250" cy="142" r="10" fill="white" opacity="0.7"/>
  <path d="M232 162 Q250 155 268 162" fill="white" opacity="0.7"/>

  <!-- Encrypted email badge -->
  <circle cx="350" cy="140" r="30" fill="white"/>
  <rect x="332" y="128" width="36" height="26" fill="#e0f2fe" rx="4"/>
  <polyline points="332,128 350,142 368,128" fill="none" stroke="#3b86fc" stroke-width="2"/>
  <circle cx="362" cy="152" r="12" fill="#3b86fc"/>
  <text x="362" y="157" text-anchor="middle" fill="white" font-size="12" font-weight="700">🔒</text>

  <!-- Anonymity badge -->
  <circle cx="150" cy="140" r="30" fill="white"/>
  <circle cx="150" cy="133" r="10" fill="#c7d2fe"/>
  <path d="M135 153 Q150 145 165 153" fill="#c7d2fe"/>
  <rect x="135" y="156" width="30" height="6" fill="#3730a3" rx="3"/>

  <!-- Star sparkles -->
  <text x="100" y="250" fill="#93c5fd" font-size="20">✦</text>
  <text x="390" y="250" fill="#93c5fd" font-size="16">✦</text>
  <text x="200" y="370" fill="#93c5fd" font-size="14">✦</text>
  <text x="310" y="365" fill="#bfdbfe" font-size="18">✦</text>
</svg>
